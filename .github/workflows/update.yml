name: Build and Deploy Map

on:
  push:
    branches: [main]
    paths:
      - "data.json"        # запускается только когда обновляются данные
      - "build_map.py"     # или сам скрипт карты
  workflow_dispatch:       # ручной запуск из UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build map
        run: python build_map.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: rebuild map [skip ci]"
          git push
